name: ML_sdfi
channels:
  - conda-forge
dependencies:
  - python=3.10
  - numpy<2
  - geopandas
  - gdal
  - fiona
  - psutil
  # rasterio (and Pillow) installed via pip from requirements_pip.txt for Windows-compatible builds
  - setuptools<76
  - pip
  # Pip deps (PyTorch, fastai, git packages, this project) installed after env create from this repo root:
  #   bash install_pytorch.sh && pip install --pre --no-build-isolation -r requirements_pip.txt
